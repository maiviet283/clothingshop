# Cloudflare Workers (Static Assets) configuration.
#
# This deploys the pre-rendered SSG output in dist/ as a static-asset Worker.
# Used by the "Workers Builds" Git integration:
#   - Build command:  npm run build
#   - Deploy command: npx wrangler deploy
#
# `name` must match your Worker's name in the Cloudflare dashboard.
name = "clothingshop"
compatibility_date = "2025-06-22"

[assets]
directory = "./dist"
# Serve the pre-rendered dist/404.html (with a 404 status) for unknown URLs,
# instead of falling back to index.html. Keeps SEO 404s correct.
not_found_handling = "404-page"
