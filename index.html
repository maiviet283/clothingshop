<!doctype html>
<html lang="vi" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f2ec" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e0d0b" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.hstatic.net" />
    <!-- Document title and SEO meta are injected per-route by the Seo
         component (vite-react-ssg Head) during static pre-rendering. -->
    <!-- Without JS the IntersectionObserver never runs, so show reveal content. -->
    <noscript>
      <style>
        .reveal { opacity: 1 !important; transform: none !important; }
      </style>
    </noscript>
    <!-- Set theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          // Default to light; only a previously stored choice overrides it.
          var stored = localStorage.getItem('torano-theme');
          document.documentElement.setAttribute(
            'data-theme',
            stored === 'dark' ? 'dark' : 'light'
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
